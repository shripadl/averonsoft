# Daily sports data ingestion for averonsoft.com
#
# Required GitHub repo secrets:
#   CRON_SECRET — same value as CRON_SECRET on Vercel (generate a long random string)
#
# Manual run: Actions → Sports ingestion → Run workflow

name: Sports ingestion

on:
  schedule:
    # 06:00 UTC daily (~11:30 IST, ~07:00 UK summer)
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger /api/sports/ingestion/run
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET is not set in GitHub repository secrets."
            exit 1
          fi
          curl -fsS --max-time 120 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "https://www.averonsoft.com/api/sports/ingestion/run"

      - name: Enrich football stats (batched v2 features)
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          for i in 1 2 3 4 5 6 7 8; do
            curl -fsS --max-time 120 \
              -H "Authorization: Bearer ${CRON_SECRET}" \
              "https://www.averonsoft.com/api/sports/football/enrich-stats?limit=50" || true
          done
