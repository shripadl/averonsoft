<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#fff;color:#111827;line-height:1.55}
  .layout{display:block;max-width:900px;margin:0 auto}
  .top{display:grid;grid-template-columns:1fr 1fr;gap:24px;padding:36px 40px 28px;background:#f8fafc;border-bottom:1px solid #e2e8f0}
  h1{font-size:1.65rem;font-weight:700}
  .headline{color:#475569;font-size:0.9rem;margin-top:4px}
  .side-label{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.1em;color:#94a3b8;margin-bottom:4px}
  .side-val{font-size:0.85rem;margin-bottom:10px;word-break:break-word}
  .main{padding:28px 40px 40px}
  .sec{margin-bottom:24px}
  .sec h2{font-size:0.72rem;text-transform:uppercase;letter-spacing:0.08em;color:#0f766e;margin-bottom:12px}
  .chip{background:#ecfdf5;color:#047857;padding:4px 10px;border-radius:4px;font-size:0.75rem;margin:3px;display:inline-block}
  .exp-item{margin-bottom:14px}
  .exp-item h3{font-size:0.92rem}
  .meta{font-size:0.78rem;color:#64748b}
  @media(max-width:640px){.top{grid-template-columns:1fr;padding:24px 20px}.main{padding:20px}}
</style>
</head>
<body class="tpl-sidebar">
<div class="layout">
  <header class="top">
    <div>
      <h1>{{fullName}}</h1>
      <p class="headline">{{headline}}</p>
    </div>
    <div>
      <p class="side-label">Contact</p>
      <p class="side-val">{{email}}</p>
      <p class="side-val">{{phone}}</p>
      <p class="side-val">{{location}}</p>
    </div>
  </header>
  <div class="main"><main>{{sections}}</main></div>
</div>
</body>
</html>
