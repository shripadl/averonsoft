<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#fff;color:#1e293b;padding:40px 48px;max-width:820px;margin:0 auto}
  h1{font-size:1.85rem;color:#4f46e5}
  .headline{color:#6366f1;margin-top:4px}
  .contact{font-size:0.82rem;color:#64748b;margin:10px 0 28px}
  .sec{margin-bottom:28px}
  .sec h2{font-size:0.75rem;text-transform:uppercase;letter-spacing:0.1em;color:#4f46e5;margin-bottom:14px}
  .tl-item{display:block;padding-left:28px;position:relative;margin-bottom:20px;border-left:2px solid #c7d2fe}
  .tl-marker{position:absolute;left:-7px;top:4px;width:12px;height:12px;background:#4f46e5;border-radius:50%}
  .tl-item h3{font-size:0.95rem}
  .tl-item .at{color:#6366f1;font-weight:400}
  .meta{font-size:0.78rem;color:#64748b}
  .skill-row{display:block;margin-bottom:8px}
  .skill-name{font-size:0.82rem;display:block;margin-bottom:4px}
  .skill-bar{display:block;height:6px;background:#e0e7ff;border-radius:3px}
  .skill-fill{display:block;height:100%;width:85%;background:#4f46e5;border-radius:3px}
  @media(max-width:640px){body{padding:24px 20px}}
</style>
</head>
<body class="tpl-timeline">
<header>
  <h1>{{fullName}}</h1>
  <p class="headline">{{headline}}</p>
  <p class="contact">{{contactLine}}</p>
</header>
<main>{{sections}}</main>
</body>
</html>
