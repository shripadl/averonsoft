<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Arial,Helvetica,sans-serif;background:#fff;color:#111827;line-height:1.5}
  .banner{background:#1e3a5f;color:#fff;padding:32px 48px}
  h1{font-size:1.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.04em}
  .headline{font-size:0.95rem;opacity:0.9;margin-top:6px}
  .contact{font-size:0.8rem;margin-top:12px;opacity:0.85}
  .body{padding:32px 48px;max-width:820px}
  .sec{margin-bottom:24px}
  .sec h2{font-size:0.85rem;color:#1e3a5f;border-bottom:2px solid #1e3a5f;padding-bottom:4px;margin-bottom:14px;text-transform:uppercase;letter-spacing:0.06em}
  .chip{background:#e8eef4;color:#1e3a5f;padding:4px 10px;font-size:0.75rem;margin:2px 4px 2px 0;display:inline-block;font-weight:600}
  .exp-item{margin-bottom:14px;padding-left:12px;border-left:3px solid #1e3a5f}
  .exp-item h3{font-size:0.95rem}
  .meta{font-size:0.78rem;color:#6b7280;font-weight:600}
  .desc{font-size:0.88rem;margin-top:4px}
  @media(max-width:640px){.banner,.body{padding:24px 20px}}
</style>
</head>
<body class="tpl-corporate">
<header class="banner">
  <h1>{{fullName}}</h1>
  <p class="headline">{{headline}}</p>
  <p class="contact">{{contactLine}}</p>
</header>
<div class="body"><main>{{sections}}</main></div>
</body>
</html>
