<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Palatino Linotype",Palatino,serif;background:#fff;color:#1c1917;padding:48px;max-width:800px;margin:0 auto}
  .hero{text-align:center;padding-bottom:28px;border-bottom:1px solid #d6d3d1;margin-bottom:32px}
  h1{font-size:2.2rem;font-weight:400;letter-spacing:0.06em;text-transform:uppercase}
  .headline{font-size:0.95rem;color:#78716c;margin-top:10px;font-style:italic}
  .contact{font-size:0.82rem;color:#a8a29e;margin-top:14px}
  .sec{margin-bottom:28px}
  .sec h2{font-size:0.75rem;text-align:center;letter-spacing:0.25em;text-transform:uppercase;color:#57534e;margin-bottom:16px}
  .sec h2::before,.sec h2::after{content:" — "}
  .chip{border:1px solid #d6d3d1;background:#fafaf9;padding:5px 12px;border-radius:2px;font-size:0.78rem;margin:4px;display:inline-block}
  .exp-item{text-align:left;margin-bottom:18px;padding-bottom:18px;border-bottom:1px dotted #e7e5e4}
  .exp-item:last-child{border:none}
  .exp-item h3{font-size:1rem;font-weight:600}
  .meta{color:#78716c;font-size:0.8rem}
  @media(max-width:640px){body{padding:28px 20px}.hero{text-align:left}}
</style>
</head>
<body class="tpl-elegant">
<header class="hero">
  <h1>{{fullName}}</h1>
  <p class="headline">{{headline}}</p>
  <p class="contact">{{contactLine}}</p>
</header>
<main>{{sections}}</main>
</body>
</html>
