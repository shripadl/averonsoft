<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Times New Roman",Times,serif;background:#fff;color:#000;padding:48px 56px;max-width:800px;margin:0 auto;line-height:1.45}
  h1{font-size:1.5rem;text-transform:uppercase;letter-spacing:0.08em;text-align:center}
  .headline{text-align:center;font-size:0.95rem;margin-top:6px}
  .contact{text-align:center;font-size:0.85rem;margin:12px 0 28px}
  .sec{margin-bottom:22px}
  .sec h2{font-size:0.8rem;text-transform:uppercase;border-bottom:1px solid #000;padding-bottom:2px;margin-bottom:10px;letter-spacing:0.05em}
  .skills-list{margin-left:20px;font-size:0.9rem}
  .skills-list li{margin-bottom:4px}
  .exp-item{margin-bottom:12px}
  .exp-item h3{font-size:0.95rem;font-weight:700}
  .meta{font-size:0.85rem}
  .desc{font-size:0.9rem;margin-top:4px}
  @media(max-width:640px){body{padding:28px 24px}}
</style>
</head>
<body class="tpl-classic">
<header>
  <h1>{{fullName}}</h1>
  <p class="headline">{{headline}}</p>
  <p class="contact">{{email}} | {{phone}} | {{location}}</p>
</header>
<main>{{sections}}</main>
</body>
</html>
