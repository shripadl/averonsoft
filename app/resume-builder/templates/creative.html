<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Verdana,Geneva,sans-serif;background:#0f172a;color:#e2e8f0;padding:40px;max-width:820px;margin:0 auto}
  h1{font-size:2rem;color:#38bdf8;font-weight:800}
  .headline{color:#94a3b8;margin-top:6px;font-size:0.95rem}
  .contact{font-size:0.8rem;color:#64748b;margin-top:12px}
  .sec{margin-bottom:22px;padding:16px 20px;background:#1e293b;border-radius:8px;border-left:4px solid #38bdf8}
  .sec h2{font-size:0.72rem;text-transform:uppercase;color:#38bdf8;letter-spacing:0.1em;margin-bottom:10px}
  .chip{background:#0f172a;border:1px solid #38bdf8;color:#7dd3fc;padding:4px 10px;border-radius:4px;font-size:0.72rem;margin:3px;display:inline-block}
  .exp-item{margin-bottom:14px}
  .exp-item h3{color:#f1f5f9;font-size:0.92rem}
  .meta{color:#64748b;font-size:0.78rem}
  .desc{color:#cbd5e1;font-size:0.85rem;margin-top:4px}
  @media(max-width:640px){body{padding:24px 16px}}
</style>
</head>
<body class="tpl-creative">
<header style="margin-bottom:28px">
  <h1>{{fullName}}</h1>
  <p class="headline">{{headline}}</p>
  <p class="contact">{{contactLine}}</p>
</header>
<main>{{sections}}</main>
</body>
</html>
